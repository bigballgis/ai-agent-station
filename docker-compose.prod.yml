# ============================================================
# AegisNexus Platform - Production Docker Compose Configuration
# ============================================================
#
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# Required environment variables (.env.production):
#   DB_PASSWORD, REDIS_PASSWORD, JWT_SECRET, GRAFANA_ADMIN_PASSWORD
#   OPENAI_API_KEY (optional), QWEN_API_KEY (optional)
#
# Features:
#   - Resource limits (memory, CPU) for all services
#   - Health checks for all services
#   - Restart policies (unless-stopped)
#   - JSON logging with size limits and retention
#   - Network isolation (backend, frontend, monitoring)
#   - Read-only root filesystem where possible
#   - Non-root container users
# ============================================================

version: '3.8'

services:
  # ===========================================
  # PostgreSQL 16 (Production)
  # ===========================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-agent-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD environment variable is required}
      POSTGRES_DB: aegisnexus
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aegisnexus"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2.0'
        reservations:
          memory: 512m
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
        tag: "postgres"

  # ===========================================
  # Redis 7 (Production)
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: ai-agent-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD environment variable is required}
      --maxmemory 384mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 128m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        tag: "redis"

  # ===========================================
  # Prometheus (Production)
  # ===========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: ai-agent-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=8GB'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - monitoring-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
        reservations:
          memory: 256m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        tag: "prometheus"

  # ===========================================
  # Grafana (Production)
  # ===========================================
  grafana:
    image: grafana/grafana:latest
    container_name: ai-agent-grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/"
      GF_INSTALL_PLUGINS: "grafana-clock-panel"
      GF_LOG_MODE: "json file"
      GF_LOG_FILE_NAME: "grafana.log"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - monitoring-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
        reservations:
          memory: 128m
          cpus: '0.1'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        tag: "grafana"

  # ===========================================
  # Backend (Production)
  # ===========================================
  backend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-aegisnexus}/backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-agent-backend
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_FORWARD_HEADERS_STRATEGY: NATIVE
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aegisnexus?stringtype=unspecified
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      # JWT
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1800000}
      # LLM Providers
      LLM_DEFAULT_PROVIDER: ${LLM_DEFAULT_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_DEFAULT_MODEL: ${OPENAI_DEFAULT_MODEL:-gpt-4o}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      QWEN_DEFAULT_MODEL: ${QWEN_DEFAULT_MODEL:-qwen-plus}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-qwen2:7b}
      # LangChain4j
      LANGCHAIN4J_MEMORY_SIZE: ${LANGCHAIN4J_MEMORY_SIZE:-20}
      LANGCHAIN4J_MEMORY_STORE: ${LANGCHAIN4J_MEMORY_STORE:-redis}
      LANGCHAIN4J_TOOL_CALLING: ${LANGCHAIN4J_TOOL_CALLING:-true}
      LANGCHAIN4J_TOOL_MAX_ITERATIONS: ${LANGCHAIN4J_TOOL_MAX_ITERATIONS:-5}
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      # File Storage
      APP_STORAGE_PATH: /app/data/storage
      # JVM Options
      JAVA_OPTS: ${JAVA_OPTS:--XX:+UseG1GC --XX:MaxRAMPercentage=75.0 --XX:+HeapDumpOnOutOfMemoryError --XX:HeapDumpPath=/app/logs/}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - backend_storage:/app/data/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - backend-network
      - frontend-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: '4.0'
        reservations:
          memory: 1g
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "200m"
        max-file: "10"
        tag: "backend"

  # ===========================================
  # Frontend (Production)
  # ===========================================
  frontend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-aegisnexus}/frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-agent-frontend
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5173/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - frontend-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
        reservations:
          memory: 64m
          cpus: '0.1'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        tag: "frontend"

  # ===========================================
  # Nginx Reverse Proxy (Production)
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: ai-agent-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - frontend-network
      - backend-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
        reservations:
          memory: 64m
          cpus: '0.1'
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
        tag: "nginx"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  backend_storage:
    driver: local
  nginx_logs:
    driver: local

networks:
  backend-network:
    driver: bridge
    internal: false
  frontend-network:
    driver: bridge
    internal: false
  monitoring-network:
    driver: bridge
    internal: true  # Monitoring network is isolated from external access
