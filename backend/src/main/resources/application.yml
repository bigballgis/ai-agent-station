server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  shutdown: graceful
  # HTTP 响应压缩（最佳实践：减少 3-10x 网络传输量）
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
    min-response-size: 1024
  # Tomcat 线程优化
  tomcat:
    max-threads: 200
    min-spare-threads: 20
    connection-timeout: 30000
    accept-count: 100
    max-connections: 10000
  # 反向代理场景必需
  forward-headers-strategy: NATIVE

spring:
  application:
    name: ai-agent-platform
  lifecycle:
    timeout-per-shutdown-phase: 30s

  # Jackson日期格式统一
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

  # PostgreSQL数据库配置
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/ai_agent_platform?stringtype=unspecified}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true
        # Hibernate 二级缓存配置（使用 Redis）
        # 注意：启用需要添加 hibernate-redis 依赖到 pom.xml
        # 例如: com.github.debop:hibernate-redis:6.2.13.Final
        # cache:
        #   use_second_level_cache: true
        #   use_query_cache: true
        #   region.factory_class: org.hibernate.cache.redis.RedisRegionFactory

  # Flyway数据库迁移
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    encoding: UTF-8

  # Redis配置 - 支持单机和集群模式
  data:
    redis:
      # 单机模式配置 (默认)
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms
      # 集群模式配置 (取消注释以启用)
      # cluster:
      #   max-redirects: 3
      #   nodes:
      #     - redis-1:7001
      #     - redis-2:7002
      #     - redis-3:7003
      #     - redis-4:7004
      #     - redis-5:7005
      #     - redis-6:7006

  # Cache配置
  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false

# Actuator监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true

# 日志配置
logging:
  file:
    name: logs/application.log
    max-size: 100MB
    max-history: 30
  level:
    com.aiagent: ${LOG_LEVEL:info}
    org.springframework.web: info
    org.hibernate: warn
    org.hibernate.SQL: warn
    org.springframework.security: warn
    com.zaxxer.hikari: warn
    org.flywaydb: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [traceId=%X{traceId}] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [traceId=%X{traceId}] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      file-name-pattern: logs/application.%d{yyyy-MM-dd}.%i.log
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 3GB

# AI Agent配置
ai-agent:
  # 大模型配置 (LangChain4j 原生驱动)
  llm:
    default-provider: ${LLM_DEFAULT_PROVIDER:openai}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      default-model: ${OPENAI_DEFAULT_MODEL:gpt-4o}
      timeout-seconds: ${OPENAI_TIMEOUT:60}
      log-requests: ${LLM_LOG_REQUESTS:false}
      log-responses: ${LLM_LOG_RESPONSES:false}
    qwen:
      api-key: ${QWEN_API_KEY:}
      base-url: ${QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      default-model: ${QWEN_DEFAULT_MODEL:qwen-plus}
      timeout-seconds: ${QWEN_TIMEOUT:60}
      log-requests: ${LLM_LOG_REQUESTS:false}
      log-responses: ${LLM_LOG_RESPONSES:false}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      default-model: ${OLLAMA_DEFAULT_MODEL:qwen2:7b}
      timeout-seconds: ${OLLAMA_TIMEOUT:120}
      num-ctx: ${OLLAMA_NUM_CTX:4096}
  # LangChain4j 配置
  langchain4j:
    chat-memory:
      max-messages: ${LANGCHAIN4J_MEMORY_SIZE:20}
      store-type: ${LANGCHAIN4J_MEMORY_STORE:in-memory}  # in-memory / redis
    tool-calling:
      max-iterations: ${LANGCHAIN4J_TOOL_MAX_ITERATIONS:5}
      enabled: ${LANGCHAIN4J_TOOL_CALLING:true}
  # Agent编排配置
  orchestration:
    engine: langchain4j
    timeout: 30s
  # 租户配置
  tenant:
    default-schema: public
    schema-prefix: t_
  # 内存配置
  memory:
    enabled: true
    max-sessions: 10000
    session-ttl: 86400s
  # 测试配置
  test:
    # 测试数据隔离配置
    data-isolation:
      enabled: true
      schema-prefix: test_
    # 测试执行配置
    execution:
      timeout: 60s
      concurrent-limit: 10
      max-retry: 3
    # 测试数据清理配置
    cleanup:
      enabled: true
      retention-days: 30
      cron-expression: 0 0 0 * * ?

# 文件上传配置
spring.servlet:
  multipart:
    max-file-size: 50MB
    max-request-size: 50MB

# JWT配置
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:1800000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# 文件存储配置
app:
  storage:
    path: ${FILE_STORAGE_PATH:/data/uploads}
  thread-pool:
    core-size: ${THREAD_POOL_CORE:8}
    max-size: ${THREAD_POOL_MAX:16}
    queue-capacity: ${THREAD_POOL_QUEUE:200}
    keep-alive-seconds: 60

# 工作流引擎配置
workflow:
  # 工作流执行最大时长（默认5分钟），超时自动标记为FAILED
  max-execution-duration: ${WORKFLOW_MAX_EXECUTION_DURATION:300}
  # 工作流定义最大节点数
  max-node-count: ${WORKFLOW_MAX_NODE_COUNT:50}
  # 工作流定义最大边数
  max-edge-count: ${WORKFLOW_MAX_EDGE_COUNT:100}

# CORS配置
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
