server:
  port: 0
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: false

jwt:
  secret: test-secret-key-for-unit-testing-only-must-be-at-least-32-chars
  expiration: 3600000

langchain4j:
  memory-store: in-memory
