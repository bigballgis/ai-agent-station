apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-agent-platform

resources:
  - namespace.yml
  - secret.yml
  - postgres.yml
  - redis.yml
  - backend.yml
  - frontend.yml

secretGenerator:
  - name: ai-agent-secrets
    literals:
      - openai-api-key=your-openai-api-key
      - qwen-api-key=your-qwen-api-key
