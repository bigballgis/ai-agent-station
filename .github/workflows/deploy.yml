name: Deploy
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: false
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      env_file: ${{ steps.env.outputs.env_file }}
      compose_file: ${{ steps.env.outputs.compose_file }}
    steps:
      - id: env
        run: |
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            echo "env_file=.env.production" >> $GITHUB_OUTPUT
            echo "compose_file=docker-compose.prod.yml" >> $GITHUB_OUTPUT
          else
            echo "env_file=.env.staging" >> $GITHUB_OUTPUT
            echo "compose_file=docker-compose.yml" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: prepare
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Record current version
        run: |
          echo "PREVIOUS_VERSION=$(docker compose -f ${{ needs.prepare.outputs.compose_file }} ps --format '{{.Image}}' 2>/dev/null | head -1)" > /tmp/previous_version.txt

      - name: Create env file
        run: |
          cp ${{ needs.prepare.outputs.env_file }}.example .env 2>/dev/null || true
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "SPRING_PROFILES_ACTIVE=${{ github.event.inputs.environment }}" >> .env
          echo "::add-mask::.env"

      - name: Pull latest images
        run: docker compose pull 2>/dev/null || true

      - name: Build and deploy
        run: |
          docker compose -f ${{ needs.prepare.outputs.compose_file }} \
            --env-file .env \
            up -d --build --remove-orphans

      - name: Wait for health check
        run: |
          echo "Waiting for services to be healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/actuator/health > /dev/null 2>&1; then
              echo "Backend is healthy!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Health check failed after 60s"
              docker compose logs backend --tail=50
              exit 1
            fi
            sleep 2
          done

      - name: Run smoke tests
        run: |
          curl -sf http://localhost:8080/api/actuator/health | jq .

      - name: Notify deployment
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "Deployment to ${{ github.event.inputs.environment }} succeeded"
          else
            echo "Deployment to ${{ github.event.inputs.environment }} failed"
            echo "Rolling back..."
            PREVIOUS_VERSION=$(cat /tmp/previous_version.txt 2>/dev/null || echo "")
            if [ -n "$PREVIOUS_VERSION" ]; then
              echo "Rolling back to previous version: $PREVIOUS_VERSION"
              docker compose -f ${{ needs.prepare.outputs.compose_file }} up -d
            else
              docker compose -f ${{ needs.prepare.outputs.compose_file }} down
            fi
          fi

      - name: Upload version info
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: previous-version
          path: /tmp/previous_version.txt

  rollback:
    needs: deploy
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - uses: actions/checkout@v4
      - name: Download version info
        uses: actions/download-artifact@v4
        with:
          name: previous-version
      - name: Rollback
        run: |
          echo "Rolling back deployment to previous version..."
          PREVIOUS_VERSION=$(cat previous_version.txt 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_VERSION" ]; then
            echo "Restoring previous version: $PREVIOUS_VERSION"
            docker compose -f ${{ needs.prepare.outputs.compose_file }} up -d
          else
            docker compose down
          fi
          docker image prune -f
          echo "Rollback complete. Manual intervention may be required."
