name: CI
on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: aiagent_test
          POSTGRES_USER: sa
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Backend Test
        run: cd backend && mvn test -B
      - name: Backend Build
        run: cd backend && mvn package -DskipTests -B

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: cd frontend && npm ci
      - name: Type Check
        run: cd frontend && npx vue-tsc -b --noEmit
      - name: Unit Test
        run: cd frontend && npx vitest run --coverage
      - name: Build
        run: cd frontend && npm run build
      - name: Security Audit (npm)
        run: |
          cd frontend
          npm audit --audit-level=high --production || true
      - name: Check for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  docker-build:
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Build Backend Image
        run: docker build -t ai-agent-backend ./backend
      - name: Build Frontend Image
        run: docker build -t ai-agent-frontend ./frontend
