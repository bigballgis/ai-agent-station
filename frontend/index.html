<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Preconnect to the API origin to reduce first-screen request latency. -->
    <link rel="preconnect" href="/" />
    <!-- Preload critical assets. -->
    <link rel="preload" href="/favicon.svg" type="image/svg+xml" as="image" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=(), usb=()">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <!-- CDN cache policy: hashed static assets are cached long-term. -->
    <meta http-equiv="Cache-Control" content="public, max-age=31536000, immutable">
    <title>AegisNexus</title>
    <!-- Preload critical vendor chunks for faster first-screen loading. -->
    <link rel="modulepreload" href="/src/main.ts" />
    <link rel="modulepreload" href="/src/App.vue" />
    <link rel="modulepreload" href="/src/layouts/MainLayout.vue" />
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
